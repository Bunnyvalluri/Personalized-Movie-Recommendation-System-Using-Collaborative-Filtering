[server]
enableStaticServing = true
enableXsrfProtection = true
maxUploadSize = 10
maxMessageSize = 200

[browser]
gatherUsageStats = false
serverAddress = "localhost"

[runner]
magicEnabled = false
fastReruns = true

[theme]
base = "dark"
backgroundColor = "#0a0010"
secondaryBackgroundColor = "#0e0e1a"
textColor = "#f0f0f0"
primaryColor = "#e50914"
font = "sans serif"

[logger]
level = "warning"
messageFormat = "%(asctime)s %(levelname)s: %(message)s"
