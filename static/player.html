<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iBOMMA RAHUL – Watch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #050505;
    font-family: 'Outfit', sans-serif;
    color: #e5e5e5;
    min-height: 100vh;
  }

  /* ── NAVBAR ── */
  .navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(229,9,20,0.22);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 1.55rem;
    font-weight: 800;
    color: #e50914;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 18px rgba(229,9,20,0.55);
  }
  .back-btn {
    color: #aaa;
    text-decoration: none;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 7px 18px;
    border-radius: 20px;
    transition: all 0.3s;
    cursor: pointer;
    background: transparent;
    font-family: 'Outfit', sans-serif;
  }
  .back-btn:hover { color: #fff; border-color: #e50914; background: rgba(229,9,20,0.1); }

  /* ── TITLE STRIP ── */
  .title-strip {
    background: linear-gradient(135deg, #1a0000 0%, #0d0d0d 50%, #1a0000 100%);
    padding: 18px 32px;
    border-bottom: 1px solid rgba(229,9,20,0.12);
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .play-icon {
    width: 40px; height: 40px;
    background: #e50914;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 18px rgba(229,9,20,0.5);
    flex-shrink: 0;
  }
  .movie-name { font-size: 1.35rem; font-weight: 700; color: #fff; }
  .movie-name span { color: #e50914; }

  /* ── SERVER BAR ── */
  .srv-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 32px;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
  }
  .srv-label { color: #555; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
  .srv-btn {
    padding: 7px 18px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.25s;
    font-family: 'Outfit', sans-serif;
  }
  .srv-btn:hover { background: rgba(229,9,20,0.15); border-color: rgba(229,9,20,0.5); color: #fff; }
  .srv-btn.active { background: #e50914; border-color: #e50914; color: #fff; box-shadow: 0 4px 14px rgba(229,9,20,0.4); }

  /* ── CINEMA ── */
  .cinema {
    max-width: 1280px;
    margin: 24px auto;
    padding: 0 24px;
  }

  /* ── PLAYER WRAPPER ── */
  .player-wrap {
    position: relative;
    background: #000;
    border-radius: 14px;
    border: 1px solid rgba(229,9,20,0.2);
    box-shadow: 0 0 80px rgba(229,9,20,0.12), 0 30px 60px rgba(0,0,0,0.8);
    overflow: hidden;  /* safe here – no Streamlit wrapper blocking fullscreen */
  }

  iframe#player {
    display: block;
    width: 100%;
    height: 680px;
    border: none;
  }

  /* ── FULLSCREEN MODE – fills whole screen ── */
  .player-wrap:fullscreen,
  .player-wrap:-webkit-full-screen,
  .player-wrap:-moz-full-screen,
  .player-wrap:-ms-fullscreen {
    border-radius: 0 !important;
    border: none !important;
    max-width: 100vw !important;
    width: 100vw !important;
    height: 100vh !important;
  }
  .player-wrap:fullscreen iframe#player,
  .player-wrap:-webkit-full-screen iframe#player,
  .player-wrap:-moz-full-screen iframe#player,
  .player-wrap:-ms-fullscreen iframe#player {
    width: 100vw !important;
    height: 100vh !important;
  }

  /* ── FULLSCREEN BUTTON ── */
  .fs-btn {
    position: absolute;
    bottom: 14px;
    right: 14px;
    z-index: 50;
    width: 44px; height: 44px;
    background: rgba(0,0,0,0.72);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .fs-btn:hover { background: #e50914; border-color: #e50914; transform: scale(1.08); box-shadow: 0 4px 18px rgba(229,9,20,0.55); }
  .fs-btn svg { width: 20px; height: 20px; pointer-events: none; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 18px;
    color: #3a3a3a;
    font-size: 12px;
  }
  .footer span { color: #e50914; }
  .footer kbd {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 1px 7px;
    border-radius: 4px;
    color: #888;
    font-size: 11px;
    font-family: monospace;
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">iBOMMA RAHUL</div>
  <button class="back-btn" onclick="goBack()">← Back to Home</button>
</nav>

<div class="title-strip">
  <div class="play-icon">▶</div>
  <div class="movie-name">Now Playing: <span id="movie-title">Loading…</span></div>
</div>

<div class="srv-bar">
  <span class="srv-label">Switch Server:</span>
  <button class="srv-btn active" onclick="loadSrc('server1', this)">⚡ Server 1</button>
  <button class="srv-btn" onclick="loadSrc('server2', this)">⚡ Server 2</button>
  <button class="srv-btn" onclick="loadSrc('server3', this)">⚡ Server 3</button>
  <button class="srv-btn" onclick="loadSrc('server4', this)">⚡ Server 4</button>
</div>

<div class="cinema">
  <div class="player-wrap" id="player-wrap">
    <iframe id="player"
      allowfullscreen
      allow="autoplay; encrypted-media; fullscreen; picture-in-picture; web-share"
      src="about:blank">
    </iframe>

    <!-- Our custom fullscreen button -->
    <button class="fs-btn" id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen  (F)">
      <svg id="icon-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"></polyline>
        <polyline points="9 21 3 21 3 15"></polyline>
        <line x1="21" y1="3" x2="14" y2="10"></line>
        <line x1="3" y1="21" x2="10" y2="14"></line>
      </svg>
      <svg id="icon-collapse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polyline points="4 14 10 14 10 20"></polyline>
        <polyline points="20 10 14 10 14 4"></polyline>
        <line x1="10" y1="14" x2="3" y2="21"></line>
        <line x1="21" y1="3" x2="14" y2="10"></line>
      </svg>
    </button>
  </div>
</div>

<div class="footer">
  Powered by <span>iBOMMA RAHUL</span> &nbsp;•&nbsp;
  Blank player? Try another server &nbsp;•&nbsp;
  <kbd>F</kbd> Fullscreen &nbsp;•&nbsp; <kbd>Esc</kbd> Exit
</div>

<script>
  // Parse query params
  var params  = new URLSearchParams(window.location.search);
  var movieId = params.get('id') || '';
  var title   = params.get('title') || 'Movie';

  // Set title
  document.getElementById('movie-title').textContent = decodeURIComponent(title);
  document.title = 'iBOMMA RAHUL – ' + decodeURIComponent(title);

  // Server URLs
  var servers = {
    server1: 'https://moviesapi.club/movie/' + movieId,
    server2: 'https://www.2embed.cc/embed/' + movieId,
    server3: 'https://vidsrc.rip/embed/movie/' + movieId,
    server4: 'https://multiembed.mov/?video_id=' + movieId + '&tmdb=1'
  };

  // Load initial server
  document.getElementById('player').src = servers.server1;

  function loadSrc(key, btn) {
    document.getElementById('player').src = servers[key];
    document.querySelectorAll('.srv-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }

  function goBack() {
    // Go back to Streamlit home
    window.location.href = '/';
  }

  // ── FULLSCREEN (no Streamlit wrapper – works perfectly) ──
  function toggleFullscreen() {
    var wrap = document.getElementById('player-wrap');
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      // Enter fullscreen on the player-wrap div (contains both iframe and our controls)
      var req = wrap.requestFullscreen
             || wrap.webkitRequestFullscreen
             || wrap.mozRequestFullScreen
             || wrap.msRequestFullscreen;
      if (req) req.call(wrap);
    } else {
      var exit = document.exitFullscreen
              || document.webkitExitFullscreen
              || document.mozCancelFullScreen
              || document.msExitFullscreen;
      if (exit) exit.call(document);
    }
  }

  // Sync icon when fullscreen changes
  function onFsChange() {
    var active = !!(document.fullscreenElement || document.webkitFullscreenElement);
    document.getElementById('icon-expand').style.display   = active ? 'none' : '';
    document.getElementById('icon-collapse').style.display = active ? ''     : 'none';
  }
  ['fullscreenchange','webkitfullscreenchange','mozfullscreenchange','MSFullscreenChange']
    .forEach(function(ev) { document.addEventListener(ev, onFsChange); });

  // Keyboard: F = fullscreen, Esc handled natively
  document.addEventListener('keydown', function(e) {
    if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.metaKey) toggleFullscreen();
  });
</script>
</body>
</html>
